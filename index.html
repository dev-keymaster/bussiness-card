<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igor Kliuchnik</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --red:   #C8102E;
  --gold:  #B8860B;
  --cream: #FDF6EC;
  --dark:  #1C0A0A;
  --muted: #7A5C5C;
  --border:#E8D5C0;
  --hover: #FFF5F5;
  --r:     20px;
}

html,body{
  height:100%;
  background:#fff;
  font-family:'DM Sans',sans-serif;
  margin:0;padding:0;
}

.page{
  width:100%;
  min-height:100vh;
  display:flex;flex-direction:column;
}

.card{
  width:100%;
  background:#fff;
  overflow:hidden;
  flex:1;
  display:flex;flex-direction:column;
}

@keyframes rise{
  from{opacity:0;transform:translateY(22px) scale(.97)}
  to  {opacity:1;transform:none}
}

.hero{
  position:relative;
  overflow:hidden;
}

.hero-img{
  display:block;
  width:100%;
  height:220px;
  object-fit:cover;
  object-position:center center;
}

.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(10,35,87,.15) 0%,
    rgba(10,35,87,.5) 60%,
    rgba(10,35,87,.78) 100%
  );
}

.geo-cross{
  position:absolute;top:14px;right:18px;
  width:40px;height:40px;opacity:.22;z-index:2;
}

.hero-body{
  position:absolute;bottom:0;left:0;right:0;
  padding:20px 28px 26px;
  display:flex;align-items:flex-end;gap:18px;
  z-index:2;
}

.avatar-wrap{
  width:80px;height:80px;flex-shrink:0;
  border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(255,255,255,.4));
  box-shadow:0 4px 20px rgba(200,16,46,.3);
}
.avatar-placeholder{
  width:100%;height:100%;border-radius:50%;
  background:linear-gradient(135deg,#f5e4d8,#e8d0c0);
  display:flex;align-items:center;justify-content:center;
}
.avatar-placeholder svg{width:44px;height:44px;opacity:.65}

.hero-info{flex:1}
.hero-name{
  font-family:'Playfair Display',serif;
  font-size:1.55rem;font-weight:700;
  color:#fff;letter-spacing:-.01em;
  text-shadow:0 2px 12px rgba(10,35,87,.6);
  line-height:1.15;
}
.hero-title{
  font-size:.75rem;font-weight:400;
  color:rgba(255,255,255,.82);
  letter-spacing:.09em;text-transform:uppercase;
  margin-top:4px;
}
.hero-geo{
  font-family:'Playfair Display',serif;
  font-size:.68rem;font-style:italic;
  color:rgba(255,255,255,.65);
  margin-top:3px;letter-spacing:.04em;
}

@media(min-width:600px){
  .hero-img{height:auto;aspect-ratio:4/1;object-position:center bottom}
  .hero-body{padding:26px 48px 36px;gap:22px}
  .avatar-wrap{width:96px;height:96px}
  .avatar-placeholder svg{width:52px;height:52px}
  .hero-name{font-size:1.85rem}
  .hero-title{font-size:.82rem}
  .geo-cross{width:52px;height:52px;top:18px;right:24px}
}

.ornament{
  display:flex;align-items:center;gap:10px;
  padding:20px 24px 6px;
}
@media(min-width:600px){.ornament{padding:24px 48px 8px}}
.ornament-line{flex:1;height:1px;background:var(--border)}
.ornament-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);opacity:.6;
}

.body{padding:10px 20px 28px;flex:1}

@media(min-width:600px){.body{padding:12px 48px 48px}}

.contacts-label{
  font-size:.68rem;font-weight:500;
  letter-spacing:.13em;text-transform:uppercase;
  color:var(--muted);padding:0 4px 10px;
}

.contacts-list{list-style:none;display:flex;flex-direction:column;gap:8px}

@media(min-width:600px){
  .contacts-list{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
}

.contact-item{animation:fadeUp .5s cubic-bezier(.22,.97,.58,1) both}
.contact-item:nth-child(1){animation-delay:.18s}
.contact-item:nth-child(2){animation-delay:.26s}
.contact-item:nth-child(3){animation-delay:.34s}
.contact-item:nth-child(4){animation-delay:.42s}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to  {opacity:1;transform:none}
}

.contact-item a{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;
  border-radius:var(--r);
  background:var(--cream);
  border:1.5px solid transparent;
  text-decoration:none;color:var(--dark);
  height:100%;
  transition:background .17s,border-color .17s,transform .13s,box-shadow .17s;
  position:relative;overflow:hidden;
}
.contact-item a::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--red);
  transform:scaleY(0);transform-origin:bottom;
  transition:transform .18s;
}
.contact-item a:hover{
  background:var(--hover);
  border-color:rgba(200,16,46,.3);
  transform:translateX(3px);
  box-shadow:0 4px 16px rgba(200,16,46,.08);
}
.contact-item a:hover::before{transform:scaleY(1)}
.contact-item a:active{transform:scale(.98)}

.icon-wrap{
  width:40px;height:40px;flex-shrink:0;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  transition:transform .17s;
}
.contact-item a:hover .icon-wrap{transform:scale(1.08) rotate(-3deg)}
.icon-wrap svg{width:20px;height:20px}

.icon-linkedin{background:#e8f0fe}.icon-linkedin svg{color:#0a66c2}
.icon-whatsapp{background:#e7f8ef}.icon-whatsapp svg{color:#25d366}
.icon-telegram{background:#e3f2fd}.icon-telegram svg{color:#229ed9}
.icon-gmail   {background:#fce8e6}.icon-gmail    svg{color:#ea4335}

.contact-text{flex:1;min-width:0}
.contact-name{font-weight:500;font-size:.93rem;color:var(--dark);line-height:1.2}
.contact-handle{
  font-size:.73rem;color:var(--muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.contact-arrow{
  color:var(--gold);flex-shrink:0;opacity:.7;
  transition:transform .17s;
}
.contact-item a:hover .contact-arrow{transform:translateX(3px);opacity:1}

.footer{
  display:flex;align-items:center;justify-content:space-between;
  border-top:1.5px solid var(--border);
  padding:13px 22px;
}
@media(min-width:600px){.footer{padding:14px 48px}}

.flag-row{display:flex;gap:6px;align-items:center}
.flag-cross{width:14px;height:14px;position:relative}
.flag-cross::before,.flag-cross::after{
  content:'';position:absolute;background:var(--red);border-radius:1px;
}
.flag-cross::before{top:50%;left:0;right:0;height:3px;transform:translateY(-50%)}
.flag-cross::after {left:50%;top:0;bottom:0;width:3px;transform:translateX(-50%)}

.footer-text{font-size:.63rem;color:var(--muted);letter-spacing:.05em}
</style>
</head>
